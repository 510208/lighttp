name: "Publish App"

on:
  push:
    tags:
      - "v*" # 當推送以 v 開頭的標籤（如 v1.0.0）時觸發
      - "[0-9]*.[0-9]*.[0-9]" # 當推送符合版本號格式的標籤（如 1.0.0）時觸發
    # 允許手動觸發
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write # 必須：允許 action 創建 release 和上傳附件
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
          - platform: "ubuntu-22.04"
          - platform: "windows-latest"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 必須完整拉取歷史，否則無法正確比對 Git Tag

      - name: Check if version is bumped
        id: get-version
        shell: bash
        run: |
          # 1. 取得當前專案設定檔中的版本號
          CURRENT_VERSION=$(grep '"version":' src-tauri/tauri.conf.json | head -1 | awk -F: '{ print $2 }' | sed 's/[", ]//g')
          echo "VERSION=v$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # 2. 安全取得目前觸發的 Tag 名稱（若為手動觸發則無）
          TRIGGERED_TAG="${{ github.ref_name }}"

          # 3. 取得 Git 歷史中「排除目前觸發標籤」之後的最新已存在 Tag
          # 如果是手動觸發，就直接拿最新的 Tag
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            LATEST_TAG=$(git tag --sort=-v:refname | grep -v -x "$TRIGGERED_TAG" | head -n 1)
          else
            LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          fi

          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          LATEST_VERSION=${LATEST_TAG#v}

          echo "Latest deployed version in Git: $LATEST_VERSION"
          echo "Current local project version:  $CURRENT_VERSION"

          # 4. 嚴格比對：如果版本號與已發布的舊版本相同，直接中斷
          if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
            echo "❌ 錯誤：本地 tauri.conf.json 的版本號 ($CURRENT_VERSION) 已經在歷史中發布過！"
            echo "請先修改專案版本號（例如改為 0.2.1 或 0.3.0）後再重新提交。"
            exit 1
          fi

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 自動生成，無需手動設置
        with:
          tagName: app-v__VERSION__
          releaseName: "LigHTTP v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true # 發佈前為草稿，檢查後手動發佈
          prerelease: false
