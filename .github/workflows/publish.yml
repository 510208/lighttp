name: "Publish App"

on:
  push:
    tags:
      - "v*" # 當推送以 v 開頭的標籤（如 v1.0.0）時觸發
      - "[0-9]*.[0-9]*.[0-9]" # 當推送符合版本號格式的標籤（如 1.0.0）時觸發
    # 允許手動觸發
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write # 必須：允許 action 創建 release 和上傳附件
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
          - platform: "ubuntu-22.04"
          - platform: "windows-latest"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 必須完整拉取歷史，否則無法正確比對 Git Tag

      - name: Check if version is bumped
        id: get-version
        shell: bash
        run: |
          # 1. 取得當前專案設定檔（tauri.conf.json）中的版本號
          CURRENT_VERSION=$(grep '"version":' src-tauri/tauri.conf.json | head -1 | awk -F: '{ print $2 }' | sed 's/[", ]//g')
          TARGET_TAG="app-v$CURRENT_VERSION"

          # 將純版本號存入環境變數供後面重新命名步驟使用
          echo "VERSION=v$CURRENT_VERSION" >> $GITHUB_OUTPUT

          echo "Checking if $TARGET_TAG already exists in global remote history..."

          # 2. 直接對 GitHub 遠端庫查詢全部 Tag 列表 (最精確，且不需要處理本地 clone 深度問題)
          # 只要遠端返回的 refs/tags/ 目錄包含此 Tag，就代表歷史上發布過
          IF_EXISTS=$(git ls-remote --tags origin "refs/tags/${TARGET_TAG}" | awk '{print $2}')

          if [ ! -z "$IF_EXISTS" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ 嚴格阻斷：版本衝突！"
            echo "目標 Tag [ $TARGET_TAG ] 在此專案的 GitHub 歷史紀錄中早就已經存在！"
            echo "請先至專案內修改 tauri.conf.json 的 \"version\"（例如升級至 0.2.1 或 0.3.0）再行觸發。"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          else
            echo "✅ 安全放行：$TARGET_TAG 是一個全未出現過的全新版本，開始建構！"
          fi

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 自動生成，無需手動設置
        with:
          tagName: app-v__VERSION__
          releaseName: "LigHTTP v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true # 發佈前為草稿，檢查後手動發佈
          prerelease: false
